<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online PGP Tools</title>
    <script src="https://unpkg.com/openpgp@6.3.0/dist/openpgp.min.js"></script>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-controls">
        <button id="clearSensitiveBtn" class="btn-danger" type="button" onclick="clearSensitiveDataNow('clearSensitiveBtn')">Clear sensitive data</button>
        <button id="themeToggleBtn" class="theme-toggle" type="button" onclick="toggleTheme()">🌙</button>
    </div>
    <h1>🔒 Online PGP Tool</h1>
    <p class="subtitle">Your data stays on your device.</p>

    <div class="card">
        <h2>1. Generate key pair</h2>
        <label>Name:</label>
        <input type="text" id="genName" placeholder="John Doe">
        <label>E-mail (optional):</label>
        <input type="text" id="genEmail" placeholder="example@example.com (optional)">
        <label>Password:</label>
        <div class="pass-input-row">
            <input type="password" id="genPassphrase" placeholder="Enter password">
            <button id="toggleGenPassBtn" class="btn-toggle" type="button" onclick="togglePasswordVisibility('genPassphrase', 'toggleGenPassBtn')">Show</button>
        </div>
        <label>Key size:</label>
        <select id="genRsaBits">
            <option value="2048" selected>2048-bit (default)</option>
            <option value="3072">3072-bit</option>
            <option value="4096">4096-bit</option>
        </select>
        
        <button id="btnGenerate" onclick="generateKeys()">Generate keys</button>
        <div id="genError" class="error"></div>

        <div id="keyDisplayArea">
            <label>Display:</label>
            <select id="keySelector" onchange="switchKeyView()">
                <option value="public">Public Key</option>
                <option value="private">Private Key</option>
            </select>
            <textarea id="generatedKeyBox" readonly></textarea>
            <button id="copyBtn" class="btn-copy" onclick="copyKeyToClipboard()">📋 Copy to clipboard</button>
        </div>
    </div>

    <div class="card">
        <h2>2. Encrypt Message</h2>
        <label>Recipients public key:</label>
        <textarea id="encPubKey" placeholder="-----BEGIN PGP PUBLIC KEY BLOCK-----"></textarea>
        <label>Your Message:</label>
        <textarea id="encMessage" placeholder="Secret message..."></textarea>
        <button onclick="encryptMsg()">Encrypt</button>
        <div id="encResult" class="result"></div>
        <button id="encCopyBtn" class="btn-copy" onclick="copyEncryptedToClipboard()" style="display: none;">📋 Copy encrypted message</button>
    </div>

    <div class="card">
        <h2>3. Decrypt Message</h2>
        <label>Recipients private key:</label>
        <textarea id="decPrivKey" placeholder="-----BEGIN PGP PRIVATE KEY BLOCK-----"></textarea>
        <label>Password:</label>
        <div class="pass-input-row">
            <input type="password" id="decPassphrase">
            <button id="toggleDecPassBtn" class="btn-toggle" type="button" onclick="togglePasswordVisibility('decPassphrase', 'toggleDecPassBtn')">Show</button>
        </div>
        <label>Encrypted Message:</label>
        <textarea id="decMessage"></textarea>
        <button onclick="decryptMsg()">Decrypt Message</button>
        <div id="decResult" class="result"></div>
    </div>
</body>
</html>
